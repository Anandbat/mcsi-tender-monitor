name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "mcsi-tender-monitor.html"
      - "MCSI HR Товчилсон.png"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Render API URL
        run: |
          sed -i "s|RENDER_API_PLACEHOLDER|${{ secrets.RENDER_API_URL }}|g" mcsi-tender-monitor.html

      - name: Prepare pages directory
        run: |
          mkdir -p _site
          cp mcsi-tender-monitor.html _site/index.html
          cp "MCSI HR Товчилсон.png" _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
